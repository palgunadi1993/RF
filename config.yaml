# =============================================================================
# Dieng RF + ANT joint-inversion pipeline — MASTER CONFIG
# -----------------------------------------------------------------------------
# This is the ONLY file a user edits. Every runner script is called as:
#     python run_<stage>.py --config config.yaml
# and reads its parameters from the matching section below. No parameters are
# passed on the command line and none are hard-coded in the scripts.
# =============================================================================

project:
  name: dieng_rf
  root: /home/kadek/Documents/ITS/collaboration/Dieng/RF
  # All paths below are relative to `root` unless absolute.
  paths:
    continuous:   data/continuous       # day-long 3C MiniSEED per station
    stationxml:   data/stationxml       # inventory + full instrument response
    catalogs:     data/catalogs
    rf_out:       rf_out
    hk_out:       hk_out
    ccp_out:      ccp_out
    ccfs:         ant/ccfs
    disp:         ant/disp
    tomo:         tomo
    inversion:    inversion
    figures:      figures
  log_level: INFO
  # Parallel worker processes (multiprocessing, single machine). -1 = all cores.
  # Used by Stage 2 (per station), Stage 5 (per day), Stage 6 (per pair); Stage 8
  # runs n_jobs // inversion.mcmc.chains stations at once (BayHunter already
  # parallelizes its chains). Set 1 to force the old fully-serial behaviour.
  n_jobs: 4
  # Memory-aware cap on the worker count (safety net for n_jobs: -1). Workers are
  # reduced so `workers * mem_per_worker_gb` fits in currently-free RAM minus
  # `mem_headroom_gb`, using the kernel's MemAvailable at launch. This is what keeps
  # an all-cores Stage-2 run from spawning enough ObsPy workers to get OOM-killed on
  # a memory-tight box. Raise mem_per_worker_gb if a stage still swaps; set it to 0
  # to disable the cap. Defaults if omitted: 2.0 GB/worker, 2.0 GB headroom.
  mem_per_worker_gb: 2.0
  mem_headroom_gb: 2.0

# -----------------------------------------------------------------------------
# STAGE 1 — data / event catalogs (one block per source class; all three used)
# -----------------------------------------------------------------------------
data:
  sampling_rate: 100.0          # Hz of the continuous data
  components: [Z, N, E]
  response_output: VEL          # DISP | VEL | ACC for response removal
  pre_filt: [0.05, 0.1, 40, 45] # response-removal taper corners (Hz)
  # ---- where the real Dieng 3C data + metadata live (edit for your machine) ----
  # SmartSolo 3C daily files (DG.STxx.YYYY-MM-DD.mseed). run_prep symlinks these
  # into project.paths.continuous; leave null if that dir is already populated.
  source_waveform_dir: /media/kadek/My Book/Collaborations/Dieng_BB/waveforms_3c
  # Station coords (whitespace NET.STA. lat lon elev). Reused from repeater_pipeline.
  station_file: ../repeater_pipeline/station.txt
  # Merged StationXML with full DH?/DP? responses (built by the repeater pipeline's
  # scripts/build_dieng_inventory.py). run_prep stages it into data/stationxml/.
  inventory: ../repeater_pipeline/config/dieng_inventory.xml
  # date_range: null -> use the full span discoverable in the data.
  date_range: null
  copy_instead_of_link: false

catalogs:
  # Each class can be fetched from a provider or supplied as a local QuakeML.
  teleseismic:
    enabled: true
    file: data/catalogs/teleseismic.xml   # if exists, used directly
    fetch:                                  # else built from provider
      provider: USGS
      min_distance_deg: 30
      max_distance_deg: 90
      min_magnitude: 5.5
  regional:
    enabled: true
    file: data/catalogs/regional.xml
    fetch:
      provider: ISC
      min_distance_deg: 2
      max_distance_deg: 30
      min_magnitude: 4.0
  local_deep:
    enabled: true
    file: data/catalogs/local_deep.xml      # Java slab Wadati–Benioff events
    # min/max_depth_km also act as a load-time filter on a user-supplied file,
    # so shallow events in a mixed local catalog cannot leak into this class.
    fetch:
      provider: ISC
      max_distance_deg: 5
      min_depth_km: 100
      min_magnitude: 1.5

# -----------------------------------------------------------------------------
# STAGE 2 — receiver functions (rf). `defaults` apply to every class; each
# class block OVERRIDES only what differs. This is how local-deep / regional /
# teleseismic are all supported from one config.
# -----------------------------------------------------------------------------
rf:
  # NOTE: the paper (Criado-Sutti et al. 2026) used water-level deconvolution
  # (a=0.5, c=0.1, band 0.01-2 Hz). The iterative time-domain default and the
  # wider bands below are deliberate choices for the Dieng 5 Hz nodes, not the
  # paper's values. Set deconvolve: freqattr + deconv_params.waterlevel to match.
  defaults:
    phase: P
    deconvolve: time            # time (iterative) | freqattr (water-level)
    deconv_params: {f1: 0.03, f2: 20.0, max_iters: 400, min_deltaE: 0.001}
    window: [-10, 35]           # s relative to P (the saved RF window)
    signal_window: [-2, 8]      # s rel. P, SNR numerator
    noise_window: [-30, -10]    # s rel. P, SNR denominator (checked pre-trim)
    snr_min: 1.5
    moveout_ref_slowness: 0.06  # s/km reference for the stacked-RF moveout
    stack: linear               # linear | phase_weighted (Schimmel & Paulssen)
    pws_power: 2                # nu, only used when stack: phase_weighted
  classes:
    teleseismic:
      rotate: ZNE->RT
      # Paper (Criado-Sutti et al. 2026) deconvolution for the teleseismic Moho
      # H-k: water-level, Gaussian a=0.5, c=0.1, band 0.01-2 Hz. Low-frequency +
      # water-level gives smooth, coherently-stacking RFs -> a tight Fig. 3 peak.
      deconvolve: freqattr        # water-level (rf 'waterlevel')
      gauss: 0.5                  # Gaussian width a (paper)
      deconv_params: {f1: 0.01, f2: 2.0, waterlevel: 0.1}
      slowness_range: [0.04, 0.08]   # s/km (compared after s/deg -> s/km conversion)
    regional:
      rotate: ZNE->RT
      gauss: 2.5
      slowness_range: [0.06, 0.10]   # s/km
    local_deep:
      rotate: ZNE->LQT           # steep incidence -> LQT
      gauss: 3.0                 # high-frequency content (suits 5 Hz nodes)
      phase: p                   # deep events at local distance: upgoing leg is
                                 # TauP 'p' ('P' returns ZERO arrivals here)
      slowness_range: [0.00, 0.15]   # s/km; steep local rays reach ~0.13 s/km
      local_model: data/local_1d.nd  # optional .nd for per-event ray parameters;
                                     # falls back to iasp91 if the file is absent

# -----------------------------------------------------------------------------
# STAGE 3 — H–k stacking (rf / seispy)
# -----------------------------------------------------------------------------
hk:
  vp_crust: 6.0                 # km/s assumed
  h_range:  [0, 70]             # km
  h_step:   0.25                # fine grid -> smooth stack (paper-style, many trials)
  k_range:  [1.6, 2.5]
  k_step:   0.005              # 0.5 km x 0.005 Vp/Vs -> ~281 x 181 trial points
  weights:  [0.6, 0.3, 0.1]     # Ps, PpPs, PsPs amplitude weights
  run_on: [local_deep, regional, teleseismic]   # order shallow->deep for the depth correction
  # Per-class search-grid overrides (fall back to the globals above). local_deep
  # events sample crust-to-Moho; capping H well below the teleseismic range keeps
  # the stack from locking onto a crustal multiple ~50-56 km down (a false 'Moho').
  # Dieng Moho is ~30-35 km, so 45 km leaves headroom above the multiple band.
  class_overrides:
    local_deep:
      h_range: [0, 45]          # km — clip the deep-multiple degeneracy
  depth_correct_k: true         # recursive k correction (paper App. A, Eq. A6)
  # correction_layers: one {vp, thick_km} per class in run_on (shallow->deep; the
  # code reverses to Eq. A1's deepest-first indexing internally). The per-class
  # cumulative kappa become the measured profile kmeas_i; App. A recovers intrinsic
  # per-layer Vp/Vs -> hk_corrected.csv. Needs >=2 classes; leave unset to report
  # raw (uncorrected) kappa. NOTE: vp/thickness here are Dieng estimates supplied
  # by the user — the paper used its own regional Vp(z) model; adapt to yours.
  correction_layers:
    - {vp: 5.0, thick_km: 8.0}    # shallow layer (local_deep)
    - {vp: 6.4, thick_km: 22.0}   # deeper layer (teleseismic)

# -----------------------------------------------------------------------------
# STAGE 4 — CCP migration (seispy)
# -----------------------------------------------------------------------------
ccp:
  velocity_model: /home/kadek/Documents/ITS/collaboration/Dieng/repeater_pipeline/config/velocity_models/dieng_velest_min1d.txt
  depth_range: [0, 60]          # km
  depth_step: 0.5
  # Along-profile binning (paper Fig. 6 style). along_step = bin centre spacing;
  # bin_km = overlapping support window (moving-window CCP stack). Dense centres +
  # overlap give continuous, non-blocky sections while every bin stays a real mean
  # of migrated amplitudes. Set bin_km == along_step for hard, non-overlapping bins.
  along_step: 0.5               # km between bin centres
  bin_km: 2.0                   # km along-profile averaging support
  run_on: [teleseismic, regional, local_deep]
  profiles:
    - {name: NS, lon1: 109.85, lat1: -7.10, lon2: 109.95, lat2: -7.30, width_km: 10}
    - {name: EW, lon1: 109.80, lat1: -7.20, lon2: 110.00, lat2: -7.20, width_km: 10}

# -----------------------------------------------------------------------------
# STAGE 5 — ambient-noise cross-correlation (amb_noise_tools / Kaestle)
# The CC core is noise.noisecorr (validated, published). Keys below map to it.
# -----------------------------------------------------------------------------
ant:
  amb_noise_tools_dir: /home/kadek/Documents/software/amb_noise_tools  # clone of ekaestle/amb_noise_tools
  cc_len: 3600                  # s, correlation window (noisecorr window_length)
  cc_step: 1800                 # s, step -> overlap = 1 - cc_step/cc_len (=0.5 here)
  freq_norm: whiten             # any non-empty value -> whiten=True in noisecorr
                                # (plain |D|+waterlevel division, not NoisePy's RMA)
  time_norm: none               # 'one_bit' -> onebit=True in noisecorr; upstream
                                # flags its one-bit as "not well implemented" -> off
  water_level: 60               # whitening water level (dB) for noisecorr
  components: ZZ                # Rayleigh (Z-Z)
  target_sampling_rate: 20      # Hz, downsample before correlation

# -----------------------------------------------------------------------------
# STAGE 6 — dispersion (amb_noise_tools: velocity_filter + get_smooth_pv)
# Zero-crossing phase-velocity picking; the 2*pi branch is resolved against
# ref_curve. Picks are resampled onto `periods` for the joint inversion.
# -----------------------------------------------------------------------------
dispersion:
  periods: [0.5, 0.75, 1, 1.5, 2, 3, 4, 5, 6, 8]   # s (node-realistic band)
  min_vel: 1.5                  # km/s, picking bounds (get_smooth_pv)
  max_vel: 5.0
  velband: [5.0, 4.5, 1.5, 1.1] # velocity_filter corners (out,in,in,out) km/s
  min_wavelengths: 2            # reject paths shorter than N wavelengths
  # ref_curve: Rayleigh phase-velocity guide [[period_s, c_kms], ...]. Defaults to
  # a generic Dieng-crust curve in dispersion.py; override here if you have one.
  # ref_curve: [[8,3.2],[5,2.9],[3,2.5],[2,2.2],[1,1.8],[0.5,1.5]]

# -----------------------------------------------------------------------------
# STAGE 7 — dispersion -> per-station curve
# -----------------------------------------------------------------------------
tomo:
  # Always writes per-station curves for the joint inversion (two-station average).
  # path: A  -> also run full 3-D tomography via the DSurfTomo stage below
  # path: B  -> per-station curves only
  path: A

# -----------------------------------------------------------------------------
# STAGE 7-alt — DSurfTomo: direct 3-D Vs from noise dispersion (ANT-only check)
# Independent of the RF+SWD joint inversion; inverts the Stage-6 pair curves
# straight to a 3-D shear model (Fang et al. 2015). Glue only — needs the
# compiled Fortran binary. All input formats verified against DSurfTomo source.
# -----------------------------------------------------------------------------
dsurftomo:
  enabled: false                # true to write inputs (+ run if binary set)
  binary: null                  # path to compiled DSurfTomo; null -> write inputs only
  measure: phase                # phase | group (Rayleigh)
  grid_spacing_deg: 0.02        # dvxd = dvzd (lat/lon node spacing)
  pad_deg: 0.02                 # extend grid this far beyond the array
  depth_nodes_km: [0, 0.5, 1, 2, 3, 5, 8, 12, 20]   # nz nodes (defines nz)
  init_minvel: 0.8              # surface Vs of the linear-gradient starting model
  init_velgrad: 0.15            # Vs increase per km depth (km/s / km)
  minvel: 0.5                   # a-priori Vs bounds
  maxvel: 4.5
  weight: 4.0                   # data weight
  damp: 1.0                     # regularization damping
  sublayers: 3                  # depth-kernel sublayers (2~5)
  maxiter: 10
  sparsity: 0.2                 # LSMR sparsity fraction
  noiselevel: 0.02
  threshold: 3.0                # residual outlier threshold
  output_dir: dsurftomo
  timeout_s: 7200

# -----------------------------------------------------------------------------
# STAGE 8 — joint inversion RF + dispersion
# -----------------------------------------------------------------------------
inversion:
  engine: bayhunter             # bayhunter | rfsurfhmc
  rf_targets: [local_deep, teleseismic]   # which stacked RFs to feed jointly
  swd_targets: [phase]          # phase | group | both
  depth_max: 60                 # km
  priors:
    vs: [0.5, 4.8]              # km/s search range
    n_layers: [3, 12]          # transdimensional (BayHunter); fixed list for rfsurfhmc
    vpvs: [1.6, 2.0]
  misfit_sigma: {rf: 0.001, swd: 0.007}   # relative weighting (paper values)
  mcmc: {chains: 6, iterations: 100000, burnin: 40000}   # BayHunter
  hmc:  {generations: 200, population: 20, seed: 0}       # RfSurfHmc (if used)

# -----------------------------------------------------------------------------
# STAGE 9 — synthesis / plotting
# -----------------------------------------------------------------------------
plot:
  # Render each stage's figures as soon as that stage finishes (incremental), so
  # you see results while the pipeline is still running instead of only at Stage 9.
  # The mapping stage->figures lives in synthesis.STAGE_FIGURES; Stage 9 still
  # (re)renders the complete set. Set false to defer ALL plotting to Stage 9.
  per_stage: true
  # ---- global styling (publication standards) ----
  dpi: 300
  format: [png, svg]            # vector + raster; add pdf if needed
  map_backend: pygmt            # ALL geographic maps (F1,F2,F3,F9) rendered with PyGMT
  map_projection: M             # PyGMT projection code (Mercator); azimuthal for F2
  topo_resolution: 03s          # PyGMT relief grid (e.g. 01s,03s,15s) for shaded relief
  cmap_velocity: roma           # colorblind-safe, perceptually uniform (no jet)
  vs_clip: [0.5, 4.8]           # shared Vs color range across ALL Vs panels
  font_family: sans-serif
  font_size: 9
  width_cm: {single: 8.3, double: 17.0}   # journal column widths
  subpanel_labels: true         # a, b, c ...
  # ---- per-figure toggles (one figure = one switch) ----
  figures:
    F1_station_map: true
    F2_event_distribution: true
    F3_coverage_raypaths: true
    F4_hk_panels: true
    F5_hk_summary: true
    F6_rf_record_sections: true
    F7_ccp_sections: true
    F8_ccf_gather: true
    F9_dispersion_maps: true    # only meaningful if tomo.path == A
    F10_inversion_per_station: true
    F11_vs_cross_sections: true
    F12_structural_model: true
    F13_dispersion_pair_curves: true    # Stage 6: all station-pair phase-vel curves
    F13b_dispersion_image: true         # Stage 6: phase-vel dispersion energy image (colormap)
    F13c_ftan_panels: true              # Stage 6: per-pair FTAN group-vel spectrograms (supplementary)
    F14_dispersion_station_curves: true # Stage 7: two-station-average per-station curves
  # ---- figure-specific params ----
  # F13b phase-velocity dispersion image (slant-stack of cross-spectra)
  disp_img_fmin: 0.15                      # Hz, low edge (period 6.7 s)
  disp_img_fmax: 1.2                       # Hz, high edge (period 0.83 s)
  disp_img_vmin: 0.8                       # km/s, phase-velocity axis min
  disp_img_vmax: 3.0                       # km/s, phase-velocity axis max (caps slant-stack alias lobe)
  disp_img_dmin: 2.0                       # km, drop very short pairs (< a few wavelengths)
  disp_img_cmap: turbo                     # energy colormap
  # F13c per-pair FTAN group-velocity spectrograms (supplementary)
  ftan_n_pairs: 4                          # number of highest-SNR example pairs to show
  ftan_dist_range: [5.0, 16.0]             # km, pick example pairs from this interstation band
  ftan_vmin: 0.8                           # km/s, group-velocity axis min
  ftan_vmax: 2.6                           # km/s, group-velocity axis max
  ftan_period_min: 0.8                     # s
  ftan_period_max: 6.0                     # s
  ftan_zero_lag_mute: 1.5                  # s, Gaussian taper of the zero-lag lobe before FTAN
  cross_sections: [NS, EW]
  vs_slice_depths_km: [2, 5, 10, 20]       # F9 Vs depth slices (tomo.path == A)
  representative_stations: [ST01, ST05]    # F4 / F10 example panels (DG codes)
  # ---- F8 CCF gather ----
  # Band matters (verified by slant-stack semblance + per-pair image, 2026-07-09):
  # 0.5-1.5 Hz is scattered to incoherent speckle by the volcanic edifice -> NO moveout.
  # The coherent, dispersive surface wave lives at 0.3-0.8 Hz, apparent velocity ~2-3 km/s
  # (semblance peak/median ~2.5x at ~2.5 km/s once the stationary zero-lag lobe is excluded).
  ccf_bandpass: [0.3, 0.8]                 # Hz, F8 gather (low band = coherent moveout)
  ccf_symmetric: false                     # true: fold causal+acausal -> one-sided EGF (+sqrt2 SNR,
                                           #       half-width panel, crisp moveout — MSNoise standard)
                                           # false: two-sided gather (acausal at -lag, causal at +lag;
                                           #        lets you check causal/acausal symmetry = noise balance)
  ccf_zero_lag_mute: 1.0                   # s, Gaussian taper of the stationary zero-lag lobe that
                                           # otherwise dominates and masks the moving-out packet
  ccf_dist_bin_km: 0.75                    # stack pairs into distance bins; 0 = per pair (raw, noisy)
  ccf_min_pairs: 2                         # drop distance bins with fewer pairs (undersampled far offsets)
  ccf_pws: 1.0                             # phase-weighted-stack power (nu); 0 = plain linear stack.
                                           # nu=1 suppresses incoherent volcanic scatter -> cleaner moveout
                                           # (nu=2 over-thins and fragments arrivals on this dataset)
  ccf_row_norm: true                       # renormalize each bin to unit amplitude before drawing
                                           # (equalizes row heights; required so PWS bins stay visible)
  ccf_fill: true                           # variable-area fill of positive lobes -> moveout pops
  ccf_fill_color: k                        # fill colour (black = seismic standard)
  ccf_gain: 0.9                            # wiggle amplitude multiplier (<=1.0 keeps rows from overlapping)
  ccf_clip: 1.0                            # clip normalized amplitude before scaling (tames noisy bins)
  ccf_ampli: null                          # km per unit amplitude (MSNoise 'ampli'); null = auto (bin spacing)
  ccf_lag_max: 14                          # s, cropped lag window (moveout reaches ~dmax/2 km/s); null = auto
  ccf_v_min: 1.0                           # km/s, slowest wave -> sets the auto window when ccf_lag_max: null
  ccf_ref_vels: [2.0, 3.0]                 # km/s constant-velocity moveout guides (bracket the ~2.5 km/s packet)
  ccf_annotate_n: true                     # label each row with its pair count (explains far-offset noise)
  # ---- F7 CCP sections ----
  ccp_clim: 0.2                            # symmetric colour limit (mean norm amp)
  ccp_max_depth: 25                        # crop plotted depth (km); null = full
